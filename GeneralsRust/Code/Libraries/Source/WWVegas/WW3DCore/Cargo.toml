[package]
name = "ww3d_core"
version = "0.1.0"
edition = "2021"
description = "Core W3D format types, constants, and errors reused across WW3D crates"
license = "GPL-3.0"

[lib]
name = "ww3d_core"
path = "src/lib.rs"

[dependencies]
thiserror = "1.0"
bytemuck = { version = "1.16", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
math_utilities = { path = "../WWMath" }


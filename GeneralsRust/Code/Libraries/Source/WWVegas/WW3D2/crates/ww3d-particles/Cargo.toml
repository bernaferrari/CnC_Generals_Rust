[package]
name = "ww3d-particles"
version = "0.1.0"
edition = "2021"

[dependencies]
ww3d-core = { path = "../ww3d-core" }
ww3d-assets = { path = "../ww3d-assets" }
ww3d-collision = { path = "../ww3d-collision" }
glam = { version = "0.28", features = ["bytemuck"] }
wgpu = "27.0.1"
winit = "0.29"
tokio = { version = "1.48", features = ["full"] }
crossbeam = "0.8"
rayon = "1.11"
binrw = "0.11"
bytemuck = { version = "1.24", features = ["derive"] }
thiserror = "1.0"
anyhow = "1.0"
rand = "0.8"

[package]
name = "ww3d-gpu"
version = "0.1.0"
edition = "2021"
description = "WW3D GPU Abstraction Layer - Cross-platform graphics API wrapper"

[dependencies]
ww3d-core = { path = "../ww3d-core" }
wgpu = "27.0.1"
winit = { version = "0.29", optional = true }
raw-window-handle = "0.6"
bytemuck = { version = "1.24", features = ["derive"] }
thiserror = "1.0"
bitflags = "2.10"
parking_lot = "0.12"
lazy_static = "1.5"
log = "0.4"

[dependencies.glam]
version = "0.28"
features = ["bytemuck"]

[features]
default = ["winit"]
winit = ["dep:winit"]
gpu-integration-tests = []

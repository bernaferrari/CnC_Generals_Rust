[package]
name = "ww3d-assets"
version = "0.1.0"
edition = "2021"

[dependencies]
ww3d-core = { path = "../ww3d-core" }
ww3d-gpu = { path = "../ww3d-gpu" }
glam = { version = "0.28", features = ["bytemuck"] }
binrw = "0.11"
tokio = { version = "1.48", features = ["full"] }
thiserror = "1.0"
bytemuck = { version = "1.24", features = ["derive"] }
wgpu = "27.0.1"
parking_lot = "0.12"

[dev-dependencies]
tempfile = "3.23"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

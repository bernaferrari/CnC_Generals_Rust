[package]
name = "ww3d-game"
version = "0.1.0"
edition = "2021"

[dependencies]
ww3d-renderer-3d = { path = "../crates/ww3d-renderer-3d" }
ww3d-assets = { path = "../crates/ww3d-assets" }
ww3d-particles = { path = "../crates/ww3d-particles" }
ww3d-geometry = { path = "../crates/ww3d-geometry" }
ww3d-physics = { path = "../crates/ww3d-physics" }
ww3d-engine = { path = "../crates/ww3d-engine" }
glam = { version = "0.24", features = ["bytemuck"] }
bytemuck = { version = "1.14", features = ["derive"] }
winit = "0.29"
wgpu = "27.0.1"
tokio = { version = "1.0", features = ["full"] }

[[bin]]
name = "main"
path = "src/main.rs"

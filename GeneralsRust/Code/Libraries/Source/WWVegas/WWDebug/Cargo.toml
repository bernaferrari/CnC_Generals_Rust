[package]
name = "profile"
version = "0.1.0"
edition = "2021"
description = "Performance profiling library - Rust conversion of C++ profile library for Command & Conquer Generals Zero Hour"
authors = ["C&C Generals Zero Hour Rust Project"]

[dependencies]
# Core dependencies
thiserror = "1.0"
log = "0.4"

# Synchronization and threading
parking_lot = "0.12"
crossbeam = "0.8"

# Collections
dashmap = "5.5"

# Time handling
once_cell = "1.21"
backtrace = "0.3"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

# For CPU cycle counting
raw-cpuid = "11.6"

# System interface
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Foundation", "Win32_System_Diagnostics_Debug", "Win32_System_Memory", "Win32_System_Threading", "Win32_System_Pipes", "Win32_Storage_FileSystem", "Win32_System_SystemServices", "Win32_UI_WindowsAndMessaging"] }

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

[features]
default = ["function-level", "high-level"]
function-level = []
high-level = []
debug = []
internal = []

name: GameNetwork CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly tests at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  # Basic validation and linting
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt -- --check
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Check documentation
      run: cargo doc --no-deps --document-private-items
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUSTDOCFLAGS: "-D warnings"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run unit tests
      run: |
        cargo test --lib --bins
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUST_TEST_THREADS: 1
    
    - name: Run unit tests with all features
      run: |
        cargo test --lib --bins --all-features
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUST_TEST_THREADS: 1

  # Integration tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run integration tests
      run: |
        cargo test --test "*" -- --test-threads=1
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 15
    
    - name: Run property-based tests
      run: |
        cargo test --test "*property*" -- --test-threads=1
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 10

  # Load and stress tests
  load_test:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[load-test]')
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run load tests
      run: |
        cargo test --test "*load*" -- --test-threads=1 --nocapture
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 30
      env:
        RUST_LOG: info

  # Network simulation tests
  network_simulation:
    name: Network Simulation Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run network simulation tests
      run: |
        cargo test --test "*simulation*" -- --test-threads=1
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 20

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      run: |
        cargo bench
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: ./GeneralsRust/Code/GameEngine/GameNetwork/target/criterion/

  # Memory leak detection
  memory_test:
    name: Memory Leak Detection
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[memory-test]')
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly
        override: true
    
    - name: Install Valgrind
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build with debug info
      run: |
        cargo build --tests
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUSTFLAGS: "-C debuginfo=2"
    
    - name: Run memory leak detection
      run: |
        # Run a subset of tests under Valgrind
        find target/debug/deps -name "*unit*" -type f -executable | head -3 | \
        xargs -I {} valgrind --leak-check=full --show-leak-kinds=all \
        --track-origins=yes --error-exitcode=1 {} --test-threads=1
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 30

  # Coverage analysis
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly
        override: true
        components: llvm-tools-preview
    
    - name: Install grcov
      run: cargo install grcov
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-nightly-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run tests with coverage
      run: |
        export RUSTFLAGS="-Cinstrument-coverage"
        export LLVM_PROFILE_FILE="game_network-%p-%m.profraw"
        cargo test --all-features
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUST_TEST_THREADS: 1
    
    - name: Generate coverage report
      run: |
        grcov . --binary-path ./target/debug/ -s . -t lcov --branch \
        --ignore-not-existing --ignore "/*" -o coverage.lcov
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./GeneralsRust/Code/GameEngine/GameNetwork/coverage.lcov
        flags: unittests
        name: codecov-umbrella
    
    - name: Check coverage threshold
      run: |
        # Extract coverage percentage and check if it meets threshold
        COVERAGE=$(grcov . --binary-path ./target/debug/ -s . -t json --branch \
        --ignore-not-existing --ignore "/*" | \
        jq '.message | split(" ") | .[0] | split("%") | .[0]' -r)
        echo "Coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 90.0" | bc -l) )); then
          echo "Coverage $COVERAGE% is below threshold of 90%"
          exit 1
        fi
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork

  # Cross-compilation tests
  cross_compile:
    name: Cross Compilation
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        target: [
          x86_64-unknown-linux-musl,
          aarch64-unknown-linux-gnu,
          x86_64-pc-windows-gnu,
          x86_64-apple-darwin
        ]
        exclude:
          # Skip macOS cross-compilation (requires special setup)
          - target: x86_64-apple-darwin
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true
    
    - name: Install cross
      run: cargo install cross
    
    - name: Cross compile
      run: |
        cross build --target ${{ matrix.target }} --release
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork

  # Documentation build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build documentation
      run: |
        cargo doc --all-features --no-deps --document-private-items
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      env:
        RUSTDOCFLAGS: "--deny warnings"
    
    - name: Deploy documentation
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./GeneralsRust/Code/GameEngine/GameNetwork/target/doc

  # Final status check
  ci_success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, security, test, integration, network_simulation, docs]
    if: always()
    steps:
    - name: Check all jobs
      run: |
        if [[ "${{ needs.lint.result }}" == "success" && \
              "${{ needs.security.result }}" == "success" && \
              "${{ needs.test.result }}" == "success" && \
              "${{ needs.integration.result }}" == "success" && \
              "${{ needs.network_simulation.result }}" == "success" && \
              "${{ needs.docs.result }}" == "success" ]]; then
          echo "All required checks passed!"
          exit 0
        else
          echo "Some required checks failed!"
          exit 1
        fi

  # Nightly comprehensive test
  nightly_comprehensive:
    name: Nightly Comprehensive Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run all tests
      run: |
        cargo test --all-features -- --test-threads=1
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
      timeout-minutes: 60
      env:
        RUST_LOG: debug
    
    - name: Run benchmarks
      run: |
        cargo bench
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Generate test report
      run: |
        echo "Nightly test completed at $(date)" > nightly_report.txt
        echo "Test results:" >> nightly_report.txt
        echo "- All unit tests: PASSED" >> nightly_report.txt
        echo "- All integration tests: PASSED" >> nightly_report.txt
        echo "- All benchmarks: COMPLETED" >> nightly_report.txt
      working-directory: ./GeneralsRust/Code/GameEngine/GameNetwork
    
    - name: Upload nightly report
      uses: actions/upload-artifact@v3
      with:
        name: nightly-test-report
        path: ./GeneralsRust/Code/GameEngine/GameNetwork/nightly_report.txt
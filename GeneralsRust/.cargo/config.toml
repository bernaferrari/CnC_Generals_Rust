# Cargo configuration for cross-platform builds

# Build settings
[build]
# Increase parallelism
jobs = 8
# Force a single shared build directory for the entire workspace.
target-dir = "target"

# Target-specific configurations
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=/STACK:8388608",  # 8MB stack
]

[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--stack,8388608",
]

# macOS stack size is handled at runtime, not via linker flags
# (linker -stack_size only works for main executables, breaks proc-macros)
[target.x86_64-apple-darwin]
rustflags = []

[target.aarch64-apple-darwin]
rustflags = []

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,-z,stack-size=8388608",
]

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-Wl,-z,stack-size=8388608",
]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = [
    "-C", "link-arg=-Wl,-z,stack-size=8388608",
]

# NOTE: Cargo reads [profile.*] from Cargo.toml, not from this file on all
# toolchains. Keep disk-bound profiles in the workspace Cargo.toml (source of
# truth). Values below are retained as documentation / future Cargo support.
[profile.dev]
opt-level = 0
debug = 1
split-debuginfo = "packed"
incremental = false

[profile.dev.package."*"]
opt-level = 2
debug = false

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
debug = false
incremental = false
panic = "abort"

[profile.release-with-debug]
inherits = "release"
debug = 1
strip = false

[profile.bench]
inherits = "release"
debug = 1

# Feature resolver
[unstable]
# Enable new feature resolver
# resolver = "2"  # Already set in Cargo.toml

# Environment variables for builds
[env]
# Set RUST_BACKTRACE for better error messages during builds
RUST_BACKTRACE = "1"
# Keep all Cargo artifacts in the workspace-wide target directory even
# when commands are run from nested crate directories.
CARGO_TARGET_DIR = { value = "target", relative = true }

# Alias commands — prefer narrow crates over --workspace --all-features.
# Full-matrix builds multiply artifacts (features × bins × tests × examples).
[alias]
# Quick checks (Main only — use cargo check -p <crate> for others)
check-main = "check -p generals_main --all-targets"
check-logic = "check -p gamelogic --all-targets"
# Broad checks intentionally omit --all-features (feature matrices bloat target/)
check-all = "check --workspace --all-targets"
test-main = "test -p generals_main --lib"
test-all = "test --workspace"
clippy-main = "clippy -p generals_main --all-targets -- -D warnings"
clippy-all = "clippy --workspace --all-targets -- -D warnings"

# Build commands
build-dev = "build -p generals_main"
build-rel = "build -p generals_main --release"

# Cross-platform builds
build-windows = "build -p generals_main --target x86_64-pc-windows-msvc --release"
build-macos-x86 = "build -p generals_main --target x86_64-apple-darwin --release"
build-macos-arm = "build -p generals_main --target aarch64-apple-darwin --release"
build-linux = "build -p generals_main --target x86_64-unknown-linux-gnu --release"
build-linux-musl = "build -p generals_main --target x86_64-unknown-linux-musl --release"

# Test commands
test-quick = "test -p generals_main --lib"

# Clean commands
clean-all = "clean --workspace"
clean-dev = "clean --profile dev"
